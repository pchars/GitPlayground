name: Security

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  GIT_CONFIG_COUNT: 1
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: main
  TRIVY_VERSION: v0.72.0

jobs:
  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Semgrep SAST
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            returntocorp/semgrep:1.168.0 \
            semgrep scan \
              --config p/python \
              --config p/django \
              --config p/javascript \
              --config p/typescript \
              --config p/secrets \
              --config p/owasp-top-ten \
              --exclude-rule python.django.security.django-no-csrf-token.django-no-csrf-token \
              --metrics=off \
              --error \
              --exclude .sandboxes \
              --exclude .venv \
              --exclude htmlcov \
              --exclude node_modules \
              --exclude .cursor

  trivy-fs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Materialize Python lockfile for Trivy
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip freeze | grep -viE '^(-e |gitplayground==)' > requirements.trivy.txt
          test -s requirements.trivy.txt
          grep -qi django requirements.trivy.txt

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"

      - name: Ensure e2e npm lockfile for Trivy
        working-directory: e2e
        run: |
          if [ ! -f package-lock.json ]; then
            npm install --package-lock-only
          fi
          test -f package-lock.json

      - name: Filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: ${{ env.TRIVY_VERSION }}
          scan-type: fs
          scan-ref: .
          trivy-config: trivy.yaml
          format: table
          list-all-pkgs: true
          exit-code: "1"
          ignore-unfixed: true
          skip-dirs: .sandboxes,.venv,htmlcov,node_modules,.cursor,.cache

  trivy-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Build image for scan
        run: docker build -t gitplayground:ci .
      - name: Image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: ${{ env.TRIVY_VERSION }}
          scan-type: image
          image-ref: gitplayground:ci
          trivy-config: trivy.yaml
          format: table
          list-all-pkgs: true
          exit-code: "1"
          ignore-unfixed: true
