name: Playground E2E (manual)

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Staging base URL (no trailing slash required)"
        required: true
        type: string

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install and run Playwright
        working-directory: e2e
        run: |
          npm install
          npx playwright install --with-deps chromium
          npm test
        env:
          BASE_URL: ${{ inputs.base_url }}
