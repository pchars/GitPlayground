{% extends "core/base.html" %}
{% block title %}GitPlayground | Подтверждение почты{% endblock %}
{% block content %}
<section class="auth-wrap">
  <article class="card auth-card">
    <h2>Проверьте вашу почту</h2>
    <p>Мы отправили письмо с ссылкой активации на <strong>{{ email }}</strong>.</p>
    <p class="muted">После подтверждения email вы сможете войти в аккаунт.</p>
  </article>
</section>
{% endblock %}
