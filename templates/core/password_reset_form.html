{% extends "core/base.html" %}
{% block title %}GitPlayground | Восстановление пароля{% endblock %}
{% block content %}
<section class="auth-wrap">
  <form method="post" class="card auth-card">
    {% csrf_token %}
    <h2>Восстановление пароля</h2>
    <p class="muted">Введите email, привязанный к аккаунту.</p>
    {{ form.email.errors }}
    <label>Email {{ form.email }}</label>
    <button class="btn btn-primary full" type="submit">Отправить ссылку</button>
  </form>
</section>
{% endblock %}
